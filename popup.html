<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>popup</title>
  <link rel="stylesheet" href="./bootstrap.min.css">
  <link rel="stylesheet" href="./loaders.min.css">
  <script src="./jquery-3.1.1.min.js"></script>
  <script src="./bootstrap.min.js"></script>
  <script src="./popup.js"></script>
  <style>
    body{
      width: 500px;
      height: auto;
      font-size: 0.8rem;
      font-family: ヒラギノ角ゴシック;
    }
    a,a:hover{
      color: black;
      text-decoration: none;
    }
    .userLink:hover{
      text-decoration: underline;
    }
    .liveRow:hover{
      background-color: #eee;
    }
    .liveList{
      max-height: 560px;
      overflow-x: hidden;
    }
    .ball-pulse > div {
      background-color: #cccccc;
    }
    #svg-heart{
      height:16px;
    }
    #svg-heart>path{
      fill:orangered;
    }
    #svg-clock{
      height:16px;
    }
    #svg-clock>path{
      fill:silver;
    }
    
  </style>
</head>
<body>
  <ul class="nav nav-pills nav-fill">
    <li id="menu1" class="nav-item">
        <a href="#tab1" class="nav-link active" data-toggle="tab">
          <svg id="svg-heart" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="heart" class="svg-inline--fa fa-heart fa-w-16" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z"></path></svg>
        </a>
    </li>
    <li id="menu2" class="nav-item">
        <a href="#tab2" class="nav-link" data-toggle="tab">
          <img style="height:24px; width:24px;" src="images/live.svg">
        </a>
    </li>
    <li id="menu3" class="nav-item">
        <a href="#tab3" class="nav-link" data-toggle="tab">
          <svg id="svg-clock" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="clock" class="svg-inline--fa fa-clock fa-w-16" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M256,8C119,8,8,119,8,256S119,504,256,504,504,393,504,256,393,8,256,8Zm92.49,313h0l-20,25a16,16,0,0,1-22.49,2.5h0l-67-49.72a40,40,0,0,1-15-31.23V112a16,16,0,0,1,16-16h32a16,16,0,0,1,16,16V256l58,42.5A16,16,0,0,1,348.49,321Z"></path></svg>
        </a>
    </li>
    <li id="menu4" class="nav-item">
        <a href="#tab4" class="nav-link" data-toggle="tab" style="padding: 5px;">
          <img style="height:24px; width:24px;" src="images/chikuwa.png">
        </a>
    </li>
  </ul>
  <!-- 自動更新プログレスバー（favo: 30秒 / ちくらん: 5分） -->
  <div id="autoRefreshProgressBar" style="height:3px; background-color:#e0e0e0; display:none; overflow:hidden;">
    <div id="autoRefreshProgress" style="height:100%; width:0%; background-color:#0080ff;"></div>
  </div>
  <div class="tab-content">
      <div id="tab1" class="tab-pane active">
        <div id="favoList" class="pl-3 liveList">
          <div class="loader-inner ball-pulse text-center" style="margin-top:80px; height:140px;">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
      <div id="tab2" class="tab-pane">
        <div id="liveList" class="pl-3 liveList">
          <div class="loader-inner ball-pulse text-center" style="margin-top:80px; height:140px;">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
      <div id="tab3" class="tab-pane">
        <div id="closedList" class="pl-3 liveList" offset="0">
          <div class="loader-inner ball-pulse text-center" style="margin-top:80px; height:140px;">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
      <div id="tab4" class="tab-pane">
        <div id="chikuranList" class="pl-3 liveList">
          <div class="loader-inner ball-pulse text-center" style="margin-top:80px; height:140px;">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
  </div>
</body>
</html>
